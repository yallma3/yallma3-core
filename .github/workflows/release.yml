name: Release

on:
  push:
    tags:
      - '*'

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_valid: ${{ steps.version.outputs.is_valid }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Tag $TAG does not match version pattern (e.g., v1.0.0)"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            echo "version=$TAG" >> $GITHUB_OUTPUT
            exit 0
          fi
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_valid=true" >> $GITHUB_OUTPUT

  build:
    needs: get-version
    if: needs.get-version.outputs.is_valid == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
            ext: ""
          - target: bun-darwin-x64
            os: macos-latest
            ext: ""
          - target: bun-linux-x64
            os: ubuntu-latest
            ext: ""
          - target: bun-windows-x64
            os: ubuntu-latest
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build ${{ matrix.target }}
        run: |
          bun build index.ts --compile --target=${{ matrix.target }} --outfile=bin/yallma3${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yallma3-${{ matrix.target }}-${{ github.ref_name }}
          path: bin/yallma3${{ matrix.ext }}

  release:
    needs: [get-version, build]
    if: needs.get-version.outputs.is_valid == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-b') || contains(github.ref, '-a') }}
          generate_release_notes: true
          files: |
            artifacts/yallma3-*${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
